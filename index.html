<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reserva de Citas Médicas - IPASME</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'ipasme-blue': '#274b88',
                        'ipasme-light': '#6c8bc0'
                    }
                }
            }
        }
    </script>
    <style>
        .hidden-view { display: none !important; }
    </style>
</head>
<body class="bg-gray-100 font-sans text-gray-800 h-screen overflow-hidden">

    <!-- PANTALLA DE LOGIN -->
    <div id="login-view" class="flex h-screen items-center justify-center bg-gray-200 p-4">
        <div class="bg-white p-8 rounded-lg shadow-lg w-full max-w-md">
            <div class="text-center mb-6">
                <!-- Se asume que Ipasme.png está en la misma ruta -->
                <img src="Ipasme.png" alt="IPASME Logo" class="mx-auto max-h-24 object-contain mb-4" onerror="this.src='https://placehold.co/400x150?text=IPASME';">
                <h2 class="text-2xl font-bold text-ipasme-blue">Sistema de Citas</h2>
            </div>
            
            <form id="login-form" onsubmit="handleLogin(event)">
                <div id="login-error" class="hidden-view bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded relative mb-4 text-sm" role="alert">
                    Usuario o contraseña incorrectos.
                </div>
                
                <div class="mb-4">
                    <label class="block text-gray-700 text-sm font-bold mb-2" for="username">Usuario</label>
                    <input class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:ring-2 focus:ring-ipasme-blue" id="username" type="text" placeholder="Ingresa tu usuario" required>
                </div>
                
                <div class="mb-6">
                    <label class="block text-gray-700 text-sm font-bold mb-2" for="password">Contraseña</label>
                    <input class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 mb-3 leading-tight focus:outline-none focus:ring-2 focus:ring-ipasme-blue" id="password" type="password" placeholder="********" required>
                </div>
                
                <div class="flex items-center justify-between">
                    <button class="bg-ipasme-blue hover:bg-blue-800 text-white font-bold py-2 px-4 rounded focus:outline-none focus:shadow-outline w-full transition duration-300" type="submit">
                        Ingresar
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- PANTALLA PRINCIPAL (DASHBOARD) -->
    <div id="dashboard-view" class="hidden-view flex h-screen bg-gray-100">
        
        <!-- Sidebar -->
        <aside class="w-64 bg-ipasme-blue text-white flex flex-col shadow-lg hidden md:flex">
            <div class="p-4 bg-white text-center">
                <img src="Ipasme.png" alt="IPASME Logo" class="h-12 mx-auto object-contain" onerror="this.src='https://placehold.co/200x80?text=IPASME';">
            </div>
            <div class="p-4 border-b border-blue-800">
                <p class="text-sm">Bienvenido,</p>
                <p class="font-bold">Administrador</p>
            </div>
            <nav class="flex-1 p-4 space-y-2">
                <button onclick="showSection('citas')" id="btn-citas" class="w-full text-left px-4 py-2 rounded bg-blue-800 hover:bg-blue-700 transition">
                    📅 Gestión de Citas
                </button>
                <button onclick="showSection('perfil')" id="btn-perfil" class="w-full text-left px-4 py-2 rounded hover:bg-blue-700 transition">
                    👤 Crear Perfil
                </button>
            </nav>
            <div class="p-4 border-t border-blue-800">
                <button onclick="logout()" class="w-full text-left px-4 py-2 rounded hover:bg-red-600 transition text-red-200 hover:text-white">
                    🚪 Cerrar Sesión
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 flex flex-col h-screen overflow-hidden">
            <!-- Mobile Header -->
            <header class="md:hidden bg-ipasme-blue text-white p-4 flex justify-between items-center shadow-md">
                <span class="font-bold">IPASME Panel</span>
                <button onclick="logout()" class="text-sm bg-red-600 px-3 py-1 rounded">Salir</button>
            </header>
            
            <!-- Mobile Nav -->
            <div class="md:hidden flex bg-white shadow-sm">
                <button onclick="showSection('citas')" class="flex-1 py-3 text-center border-b-2 border-ipasme-blue font-semibold text-ipasme-blue" id="mob-btn-citas">Citas</button>
                <button onclick="showSection('perfil')" class="flex-1 py-3 text-center text-gray-500 font-semibold" id="mob-btn-perfil">Perfil</button>
            </div>

            <!-- Content Area -->
            <div class="flex-1 overflow-y-auto p-6">
                
                <!-- SECCIÓN: CITAS -->
                <div id="section-citas" class="animate-fade-in">
                    <div class="flex justify-between items-center mb-6">
                        <h1 class="text-2xl font-bold text-gray-800">Citas Médicas</h1>
                        <button onclick="showSection('nueva-cita')" class="bg-green-600 hover:bg-green-700 text-white font-bold py-2 px-4 rounded shadow">
                            + Nueva Cita
                        </button>
                    </div>

                    <!-- NUEVO: Panel de Disponibilidad -->
                    <div class="mb-6 bg-white p-4 rounded shadow-sm border-t-4 border-ipasme-blue">
                        <div class="flex flex-col md:flex-row justify-between items-center mb-4">
                            <h2 class="text-lg font-bold text-gray-700 mb-2 md:mb-0">Citas disponibles (Máx 10 por especialidad)</h2>
                            <div class="flex items-center">
                                <label class="mr-2 text-sm font-bold text-gray-600">Fecha:</label>
                                <input type="date" id="dash-fecha" class="shadow border rounded py-1 px-2 text-gray-700 focus:outline-none focus:ring-2 focus:ring-ipasme-blue" onchange="actualizarDashboard()">
                            </div>
                        </div>
                        <div class="grid grid-cols-2 md:grid-cols-4 gap-4" id="contenedor-disponibilidad">
                            <!-- Se llena con JS -->
                        </div>
                    </div>
                    
                    <div class="bg-white shadow-md rounded my-6 overflow-x-auto">
                        <table class="min-w-max w-full table-auto">
                            <thead>
                                <tr class="bg-gray-200 text-gray-600 uppercase text-sm leading-normal">
                                    <th class="py-3 px-6 text-left">Paciente</th>
                                    <th class="py-3 px-6 text-left">Especialidad</th>
                                    <th class="py-3 px-6 text-center">Fecha</th>
                                    <th class="py-3 px-6 text-center">Hora</th>
                                    <th class="py-3 px-6 text-center">Estado</th>
                                    <th class="py-3 px-6 text-center">Acciones</th>
                                </tr>
                            </thead>
                            <tbody id="tabla-citas-body" class="text-gray-600 text-sm font-light">
                                <!-- Se llena dinámicamente con JS -->
                            </tbody>
                        </table>
                    </div>
                </div>

                <!-- SECCIÓN: NUEVA CITA -->
                <div id="section-nueva-cita" class="hidden-view animate-fade-in">
                    <h1 class="text-2xl font-bold text-gray-800 mb-6">Agendar Nueva Cita</h1>
                    <div class="bg-white shadow-md rounded px-8 pt-6 pb-8 mb-4">
                        <form onsubmit="procesarNuevaCita(event)">
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                                <div class="mb-4">
                                    <label class="block text-gray-700 text-sm font-bold mb-2">Cédula del Paciente</label>
                                    <div class="flex space-x-2">
                                        <input id="nc-cedula" class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:ring-2 focus:ring-ipasme-blue" type="number" required>
                                        <button type="button" onclick="buscarPaciente()" class="bg-ipasme-blue hover:bg-blue-800 text-white font-bold py-2 px-4 rounded">Buscar</button>
                                    </div>
                                    <p id="txt-paciente-encontrado" class="text-sm font-bold text-green-600 mt-2 hidden-view"></p>
                                    <input id="nc-paciente" type="hidden" required>
                                </div>
                                <div class="mb-4">
                                    <label class="block text-gray-700 text-sm font-bold mb-2">Especialidad</label>
                                    <select id="nc-especialidad" class="shadow border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:ring-2 focus:ring-ipasme-blue">
                                        <option>Medicina General</option>
                                        <option>Odontología</option>
                                        <option>Pediatría</option>
                                        <option>Ginecología</option>
                                    </select>
                                </div>
                                <div class="mb-4">
                                    <label class="block text-gray-700 text-sm font-bold mb-2">Fecha</label>
                                    <input id="nc-fecha" class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:ring-2 focus:ring-ipasme-blue" type="date" required>
                                </div>
                                <div class="mb-4">
                                    <label class="block text-gray-700 text-sm font-bold mb-2">Turno</label>
                                    <select id="nc-turno" class="shadow border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:ring-2 focus:ring-ipasme-blue">
                                        <option value="08:00 AM">Mañana (8:00 AM)</option>
                                        <option value="01:00 PM">Tarde (1:00 PM)</option>
                                    </select>
                                </div>
                            </div>
                            
                            <!-- Mensaje de error de validación -->
                            <div id="nc-msg" class="hidden-view px-4 py-3 rounded relative mb-4 text-sm mt-4 font-bold"></div>

                            <div class="flex items-center justify-end mt-6 space-x-4">
                                <button type="button" onclick="showSection('citas')" class="text-gray-500 hover:text-gray-700 font-bold py-2 px-4">Cancelar</button>
                                <button class="bg-green-600 hover:bg-green-700 text-white font-bold py-2 px-6 rounded focus:outline-none focus:shadow-outline" type="submit">
                                    Guardar Cita
                                </button>
                            </div>
                        </form>
                    </div>
                </div>

                <!-- SECCIÓN: CREAR PERFIL -->
                <div id="section-perfil" class="hidden-view animate-fade-in">
                    <h1 class="text-2xl font-bold text-gray-800 mb-6">Crear Perfil Médico/Paciente</h1>
                    
                    <div class="bg-white shadow-md rounded px-8 pt-6 pb-8 mb-4">
                        <form onsubmit="guardarPerfil(event)">
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                                
                                <div class="mb-4">
                                    <label class="block text-gray-700 text-sm font-bold mb-2">Nombres</label>
                                    <input id="cp-nombres" class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:ring-2 focus:ring-ipasme-blue" type="text" required>
                                </div>
                                <div class="mb-4">
                                    <label class="block text-gray-700 text-sm font-bold mb-2">Apellidos</label>
                                    <input id="cp-apellidos" class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:ring-2 focus:ring-ipasme-blue" type="text" required>
                                </div>
                                <div class="mb-4">
                                    <label class="block text-gray-700 text-sm font-bold mb-2">Cédula de Identidad</label>
                                    <input id="cp-cedula" class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:ring-2 focus:ring-ipasme-blue" type="number" required>
                                </div>
                                <div class="mb-4">
                                    <label class="block text-gray-700 text-sm font-bold mb-2">Tipo de Perfil</label>
                                    <select class="shadow border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:ring-2 focus:ring-ipasme-blue">
                                        <option>Paciente</option>
                                        <option>Médico Especialista</option>
                                        <option>Administrativo</option>
                                    </select>
                                </div>
                                <div class="mb-4 md:col-span-2">
                                    <label class="block text-gray-700 text-sm font-bold mb-2">Correo Electrónico</label>
                                    <input class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:ring-2 focus:ring-ipasme-blue" type="email">
                                </div>

                            </div>
                            
                            <!-- Mensaje de éxito temporal -->
                            <div id="form-msg" class="hidden-view bg-green-100 border border-green-400 text-green-700 px-4 py-3 rounded relative mb-4 text-sm mt-4"></div>

                            <div class="flex items-center justify-end mt-6">
                                <button class="bg-ipasme-blue hover:bg-blue-800 text-white font-bold py-2 px-6 rounded focus:outline-none focus:shadow-outline" type="submit">
                                    Guardar Perfil
                                </button>
                            </div>
                        </form>
                    </div>
                </div>

            </div>
        </main>
    </div>

    <script>
        // Lógica de Autenticación
        function handleLogin(e) {
            e.preventDefault();
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            const errorBox = document.getElementById('login-error');

            if (user === 'admin' && pass === 'admin') {
                errorBox.classList.add('hidden-view');
                document.getElementById('login-view').classList.add('hidden-view');
                document.getElementById('dashboard-view').classList.remove('hidden-view');
                initDashboard();
            } else {
                errorBox.classList.remove('hidden-view');
            }
        }

        function logout() {
            document.getElementById('username').value = '';
            document.getElementById('password').value = '';
            document.getElementById('dashboard-view').classList.add('hidden-view');
            document.getElementById('login-view').classList.remove('hidden-view');
            showSection('citas'); // Reset a vista inicial
        }

        // Lógica de Navegación del Panel
        function showSection(sectionId) {
            // Ocultar todas las secciones
            document.getElementById('section-citas').classList.add('hidden-view');
            document.getElementById('section-perfil').classList.add('hidden-view');
            if(document.getElementById('section-nueva-cita')) {
                document.getElementById('section-nueva-cita').classList.add('hidden-view');
            }
            
            // Mostrar la seleccionada
            document.getElementById('section-' + sectionId).classList.remove('hidden-view');

            // Actualizar botones Sidebar
            document.getElementById('btn-citas').className = 'w-full text-left px-4 py-2 rounded transition ' + (sectionId === 'citas' ? 'bg-blue-800' : 'hover:bg-blue-700');
            document.getElementById('btn-perfil').className = 'w-full text-left px-4 py-2 rounded transition ' + (sectionId === 'perfil' ? 'bg-blue-800' : 'hover:bg-blue-700');

            // Actualizar botones Mobile
            if(document.getElementById('mob-btn-citas')) {
                 document.getElementById('mob-btn-citas').className = 'flex-1 py-3 text-center font-semibold transition ' + (sectionId === 'citas' ? 'border-b-2 border-ipasme-blue text-ipasme-blue' : 'text-gray-500');
                 document.getElementById('mob-btn-perfil').className = 'flex-1 py-3 text-center font-semibold transition ' + (sectionId === 'perfil' ? 'border-b-2 border-ipasme-blue text-ipasme-blue' : 'text-gray-500');
            }
        }

        function showMessage(text) {
            const msgBox = document.getElementById('form-msg');
            msgBox.textContent = text;
            msgBox.classList.remove('hidden-view');
            setTimeout(() => {
                msgBox.classList.add('hidden-view');
            }, 3000);
        }

        // Especialidades disponibles
        const especialidades = ['Medicina General', 'Odontología', 'Pediatría', 'Ginecología'];

        // Base de datos simulada de perfiles
        let perfiles = [
            { cedula: '12345678', nombres: 'Juan', apellidos: 'Pérez' },
            { cedula: '87654321', nombres: 'María', apellidos: 'González' }
        ];

        // Base de datos simulada de citas
        let listaCitas = [
            { paciente: 'Juan Pérez', especialidad: 'Odontología', fecha: '2026-06-15', turno: '08:00 AM', estado: 'Confirmada' },
            { paciente: 'María González', especialidad: 'Medicina General', fecha: '2026-06-15', turno: '01:00 PM', estado: 'Pendiente' }
        ];

        let controlDisponibilidad = {};

        function recalcularDisponibilidad() {
            controlDisponibilidad = {};
            listaCitas.forEach(cita => {
                if (!controlDisponibilidad[cita.fecha]) controlDisponibilidad[cita.fecha] = {};
                if (!controlDisponibilidad[cita.fecha][cita.especialidad]) controlDisponibilidad[cita.fecha][cita.especialidad] = { "08:00 AM": 0, "01:00 PM": 0 };
                controlDisponibilidad[cita.fecha][cita.especialidad][cita.turno]++;
            });
        }

        function initDashboard() {
            document.getElementById('dash-fecha').value = '2026-06-15'; // Fecha de las citas de prueba por defecto
            actualizarDashboard();
        }

        function actualizarDashboard() {
            const fecha = document.getElementById('dash-fecha').value;
            const contenedor = document.getElementById('contenedor-disponibilidad');
            const tbody = document.getElementById('tabla-citas-body');
            
            contenedor.innerHTML = '';
            tbody.innerHTML = '';

            if (!fecha) return;

            recalcularDisponibilidad();

            // 1. Actualizar tarjetas de disponibilidad
            especialidades.forEach(esp => {
                let usadasAM = 0;
                let usadasPM = 0;

                if (controlDisponibilidad[fecha] && controlDisponibilidad[fecha][esp]) {
                    usadasAM = controlDisponibilidad[fecha][esp]["08:00 AM"] || 0;
                    usadasPM = controlDisponibilidad[fecha][esp]["01:00 PM"] || 0;
                }

                const dispAM = 5 - usadasAM;
                const dispPM = 5 - usadasPM;
                const totalDisp = dispAM + dispPM;

                let colorClase = totalDisp > 0 ? 'text-green-600' : 'text-red-600';

                contenedor.innerHTML += `
                    <div class="bg-gray-50 border rounded p-3 text-center shadow-sm">
                        <h3 class="font-bold text-sm text-gray-800 mb-2">${esp}</h3>
                        <p class="text-2xl font-black ${colorClase}">${totalDisp}</p>
                        <p class="text-xs text-gray-500 mt-1">Disponibles</p>
                        <div class="flex justify-between text-xs mt-2 pt-2 border-t text-gray-600">
                            <span>Mañana: <b>${dispAM}</b></span>
                            <span>Tarde: <b>${dispPM}</b></span>
                        </div>
                    </div>
                `;
            });

            // 2. Actualizar tabla filtrando por la fecha seleccionada
            const citasDelDia = listaCitas.filter(c => c.fecha === fecha);
            
            if (citasDelDia.length === 0) {
                tbody.innerHTML = `<tr><td colspan="6" class="py-4 px-6 text-center text-gray-500 font-bold">No hay citas agendadas para esta fecha.</td></tr>`;
            } else {
                citasDelDia.forEach(cita => {
                    let colorEstado = cita.estado === 'Confirmada' ? 'bg-green-200 text-green-600' : 'bg-yellow-200 text-yellow-600';
                    tbody.innerHTML += `
                        <tr class="border-b border-gray-200 hover:bg-gray-100">
                            <td class="py-3 px-6 text-left whitespace-nowrap"><span class="font-medium">${cita.paciente}</span></td>
                            <td class="py-3 px-6 text-left">${cita.especialidad}</td>
                            <td class="py-3 px-6 text-center">${cita.fecha}</td>
                            <td class="py-3 px-6 text-center">${cita.turno}</td>
                            <td class="py-3 px-6 text-center"><span class="${colorEstado} py-1 px-3 rounded-full text-xs">${cita.estado}</span></td>
                            <td class="py-3 px-6 text-center">
                                <button class="text-blue-500 hover:text-blue-700 mx-1">Editar</button>
                                <button class="text-red-500 hover:text-red-700 mx-1">Cancelar</button>
                            </td>
                        </tr>
                    `;
                });
            }
        }

        function guardarPerfil(e) {
            e.preventDefault();
            const nombres = document.getElementById('cp-nombres').value;
            const apellidos = document.getElementById('cp-apellidos').value;
            const cedula = document.getElementById('cp-cedula').value;

            // Evitar duplicados
            if(perfiles.find(p => p.cedula === cedula)) {
                showMessage('Ya existe un perfil con esta cédula.');
                document.getElementById('form-msg').className = "bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded relative mb-4 text-sm mt-4";
                return;
            }

            perfiles.push({ cedula, nombres, apellidos });
            document.getElementById('form-msg').className = "bg-green-100 border border-green-400 text-green-700 px-4 py-3 rounded relative mb-4 text-sm mt-4";
            showMessage('Perfil creado exitosamente.');
            e.target.reset();
        }

        function buscarPaciente() {
            const cedula = document.getElementById('nc-cedula').value;
            const msgBox = document.getElementById('nc-msg');
            const txtNombre = document.getElementById('txt-paciente-encontrado');
            const inputOculto = document.getElementById('nc-paciente');

            const perfilEncontrado = perfiles.find(p => p.cedula === cedula);

            if (perfilEncontrado) {
                const nombreCompleto = `${perfilEncontrado.nombres} ${perfilEncontrado.apellidos}`;
                txtNombre.textContent = `Paciente: ${nombreCompleto}`;
                txtNombre.classList.remove('hidden-view');
                inputOculto.value = nombreCompleto;
                msgBox.classList.add('hidden-view');
            } else {
                txtNombre.classList.add('hidden-view');
                inputOculto.value = '';
                msgBox.textContent = 'Paciente no encontrado. Debe crear el perfil primero.';
                msgBox.className = "bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded relative mb-4 text-sm mt-4 font-bold";
                msgBox.classList.remove('hidden-view');
            }
        }

        function procesarNuevaCita(e) {
            e.preventDefault();
            const paciente = document.getElementById('nc-paciente').value;
            const especialidad = document.getElementById('nc-especialidad').value;
            const fecha = document.getElementById('nc-fecha').value;
            const turno = document.getElementById('nc-turno').value;
            const msgBox = document.getElementById('nc-msg');

            if (!paciente) {
                msgBox.textContent = 'Debe buscar y seleccionar un paciente válido primero.';
                msgBox.className = "bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded relative mb-4 text-sm mt-4 font-bold";
                msgBox.classList.remove('hidden-view');
                return;
            }

            recalcularDisponibilidad();

            // Validar límite
            if (controlDisponibilidad[fecha] && controlDisponibilidad[fecha][especialidad] && controlDisponibilidad[fecha][especialidad][turno] >= 5) {
                msgBox.textContent = `No hay cupos disponibles para ${especialidad} a las ${turno} en la fecha seleccionada.`;
                msgBox.className = "bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded relative mb-4 text-sm mt-4 font-bold";
                return;
            }

            // Agregar a la base de datos simulada
            listaCitas.unshift({ paciente, especialidad, fecha, turno, estado: 'Confirmada' });
            
            // Cambiar el filtro a la fecha de la nueva cita automáticamente
            document.getElementById('dash-fecha').value = fecha;

            // Limpiar y regresar
            document.getElementById('txt-paciente-encontrado').classList.add('hidden-view');
            e.target.reset();
            msgBox.classList.add('hidden-view');
            actualizarDashboard(); 
            showSection('citas');
        }
    </script>
</body>
</html>
